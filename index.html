<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abdo Belal | Portfolio</title>
    <style>
        /* CSS مدمج عشان ميبقاش فيه ملفات تانية تضيع منك */
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; margin: 0; }
        .navbar { display: flex; justify-content: space-between; padding: 20px 10%; background: #1e293b; align-items: center; }
        .nav-links button { background: transparent; border: 1px solid #38bdf8; color: #38bdf8; padding: 8px 20px; cursor: pointer; border-radius: 5px; transition: 0.3s; margin: 0 5px; }
        .nav-links button:hover { background: #38bdf8; color: white; }
        .content-section { padding: 50px 10%; text-align: center; }
        .skills-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e293b; padding: 30px; border-radius: 15px; border-bottom: 3px solid #38bdf8; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); background: #334155; }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo" style="font-weight:bold; font-size: 1.5rem;">ABDO BELAL</div>
        <div class="nav-links">
            <button onclick="showSection('home')">Home</button>
            <button onclick="showSection('skills')">Skills</button>
            <button onclick="showSection('contact')">Contact</button>
        </div>
    </nav>

    <main>
        <section id="home" class="content-section">
            <h1>Welcome to my space</h1>
            <p>I am Abdo Belal, a Web Developer and AI enthusiast.</p>
        </section>

        <section id="skills" class="content-section" style="display:none;">
            <h2>My Technical Skills</h2>
            <div class="skills-grid">
                <div class="card"><h3>Web Development</h3><p>React, JS, HTML/CSS</p></div>
                <div class="card"><h3>AI & Automation</h3><p>AI Tools, Content Creation</p></div>
                <div class="card"><h3>Computers</h3><p>System Architecture, Git</p></div>
            </div>
        </section>

        <section id="contact" class="content-section" style="display:none;">
            <h2>Contact Me</h2>
            <p>Let's build something great together!</p>
        </section>
    </main>

    <script>
        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }
    </script>
</body>
</html>
